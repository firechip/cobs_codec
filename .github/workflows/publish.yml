name: Publish to pub.dev

# Publishes via pub.dev automated publishing (OIDC) — no static credentials.
# Enable the matching publisher at:
#   pub.dev > cobs_codec > Admin > Automated publishing > GitHub Actions
#   repository=firechip/cobs_codec  tag pattern=v{{version}}
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  publish:
    permissions:
      id-token: write # Required for authentication using OIDC
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
